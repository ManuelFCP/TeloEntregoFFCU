<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/app.js"></script>
</head>
<body>
    <section id="inicio">
        <header>
            <div class="textHeader">
                <div>
                    <h1 class="title">Te lo EntregooD - Admin</h1>
                </div>
                <nav>
                    <ul>
                        <li>
                            <a href="../index.html">
                                <i class="bi bi-house-door"></i>
                                <span>Inicio</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="buttons">
                    <a href="../login.html"><i class="bi bi-person-circle"></i></a>
                </div>
            </div>
        </header>
    </section>

    <section class="container mt-5">
        <h2>Panel de Administración</h2>
        <div class="row">
            <div class="col-md-6">
                <h3>Pedidos</h3>
                <div id="pedidosList">
                    <!-- Pedidos se cargarán aquí -->
                </div>
            </div>
            <div class="col-md-6">
                <h3>Estados de Productos</h3>
                <p>Aquí se pueden verificar y actualizar los estados de los productos.</p>
                <!-- Simular algunos productos -->
                <ul class="list-group">
                    <li class="list-group-item">Pizza de Queso - Disponible</li>
                    <li class="list-group-item">Hamburguesa Clásica - Disponible</li>
                    <li class="list-group-item">Ensalada César - Agotado</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Modal de Selección de Rol -->
    <div class="modal fade" id="roleModal" tabindex="-1" aria-labelledby="roleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="roleModalLabel">Seleccionar Rol</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <button type="button" class="btn btn-primary me-3" onclick="selectRole('usuario')">Usuario</button>
                    <button type="button" class="btn btn-secondary" onclick="selectRole('admin')">Administrador</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginNombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="loginNombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="loginBtn">Iniciar Sesión</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cargar pedidos al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            const pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
            const pedidosList = document.getElementById('pedidosList');
            pedidos.forEach((pedido, index) => {
                const pedidoDiv = document.createElement('div');
                pedidoDiv.className = 'card mb-3';
                pedidoDiv.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title">${pedido.producto}</h5>
                        <p class="card-text">Cantidad: ${pedido.cantidad}</p>
                        <p class="card-text">Cliente: ${pedido.nombre} (${pedido.email})</p>
                        <p class="card-text">Dirección: ${pedido.direccion}</p>
                        <p class="card-text">Estado: <span id="estado-${index}">${pedido.estado}</span></p>
                        <button class="btn btn-success" onclick="cambiarEstado(${index}, 'En Preparación')">En Preparación</button>
                        <button class="btn btn-warning" onclick="cambiarEstado(${index}, 'Enviado')">Enviado</button>
                        <button class="btn btn-danger" onclick="cambiarEstado(${index}, 'Entregado')">Entregado</button>
                    </div>
                `;
                pedidosList.appendChild(pedidoDiv);
            });
        });

        function cambiarEstado(index, nuevoEstado) {
            let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
            pedidos[index].estado = nuevoEstado;
            localStorage.setItem('pedidos', JSON.stringify(pedidos));
            document.getElementById(`estado-${index}`).textContent = nuevoEstado;
        }
    </script>
</body>
</html>
