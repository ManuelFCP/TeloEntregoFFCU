<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/register.css">
    <script src="../js/app.js"></script>
</head>
<body>
    <section id="inicio">
        <header>
            <div class="textHeader">
                <div>
                    <h1 class="title">Te lo EntregooD</h1>
                </div>
                <nav>
                    <ul>
                        <li>
                            <a href="../index.html">
                                <i class="bi bi-house-door"></i>
                                <span>Inicio</span>
                            </a>
                        </li>
                        <li>
                            <a href="#comidas">
                                <i class="bi bi-cup-hot"></i>
                                <span>Comidas</span>
                            </a>
                        </li>
                        <li>
                            <a href="#platos">
                                <i class="bi bi-cup-hot"></i>
                                <span>Platos</span>
                            </a></li>
                        <li>
                            <a href="#Conocenos">
                                <i class="bi bi-people"></i>
                                <span>Conocenos</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="buttons">
                    <a href="../login.html"><i class="bi bi-person-circle"></i></a>
                </div>
            </div>
        </header>
    </section>

    <section>
        <div class="login-box">
            <h2>Create an Acccount</h2>
            <form>
              <div class="user-box">
                <input type="text" name="" id="userName1" required="">
                <label>Username</label>
              </div>
              <div class="user-box">
                <input type="password" name="" id="pass1" required="">
                <label>Password</label>
              </div>
              <div class="user-box">
                <input type="email" name="" required="">
                <label>Email Address</label>
              </div>
              <a href="#" class="button" onclick="Registra();">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Create
              </a>
              <p class="message"> Already registered? <a href="usuarios.html" class="link"> Sign In</a></p>
            </form>
        </div>
    </section>
    <br><br><br><br><br>

    <!-- Modal de Selección de Rol -->
    <div class="modal fade" id="roleModal" tabindex="-1" aria-labelledby="roleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="roleModalLabel">Seleccionar Rol</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <button type="button" class="btn btn-primary me-3" onclick="selectRole('usuario')">Usuario</button>
                    <button type="button" class="btn btn-secondary" onclick="selectRole('admin')">Administrador</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginNombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="loginNombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="loginBtn">Iniciar Sesión</button>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
