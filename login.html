<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Si ya inició sesión, redirigir automáticamente al menú principal
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0 vh-100">
            <!-- Columna del Carousel (oculta en pantallas pequeñas) -->
            <div class="col-lg-7 d-none d-lg-block position-relative">
                <div id="loginCarousel" class="carousel slide" data-bs-ride="carousel" style="height: 100%;">
                    <div class="carousel-inner h-100">
                        <div class="carousel-item active h-100">
                            <img src="images/comida.jpg" class="d-block w-100" style="object-fit: cover; height: 100%; filter: brightness(0.5);">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="images/pizza.jpg" class="d-block w-100" style="object-fit: cover; height: 100%; filter: brightness(0.5);">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="images/Hamburguesa2.jpg" class="d-block w-100" style="object-fit: cover; height: 100%; filter: brightness(0.5);">
                        </div>
                    </div>
                </div>
                <div class="position-absolute top-50 start-50 translate-middle text-center text-white" style="z-index: 10;">
                    <h1 class="hero-title" style="font-size: 6rem !important; animation: none; text-shadow: 2px 2px 4px #000;">Fast Food</h1>
                </div>
            </div>

            <!-- Columna del Formulario -->
            <div class="col-lg-5 col-md-12 d-flex flex-column justify-content-center align-items-center p-4">
                <div class="card bg-dark text-white shadow-lg border-0 rounded-4 w-100" style="border-top: 5px solid #dc3545; max-width: 420px;">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">Iniciar Sesión</h2>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="username" class="form-label fw-semibold">Usuario</label>
                                <input type="text" class="form-control form-control-lg" id="username" placeholder="Ingresa tu usuario" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="Ingresa tu contraseña" required>
                            </div>
                            <button type="button" class="btn btn-danger btn-lg w-100 fw-bold text-white shadow-sm mt-2" id="loginBtn">Iniciar Sesión</button>
                        </form>
                        <div id="errorMessage" class="mt-3 text-danger text-center fw-semibold" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (username === 'Cliente1' && password === 'Arroba123') {
                // Guardar sesión y redirigir al menú principal
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else if (username === 'Admi1' && password === 'Seguridad123') {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('role', 'admin');
                window.location.href = 'pages/admin.html';
            } else {
                errorMessage.textContent = 'Credenciales incorrectas. Intente de nuevo.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
